<style>
  :root {
    --bg: #FAFAF5;
    --surface: #FFFFFF;
    --ink: #18181B;
    --ink-muted: #52525B;
    --ink-subtle: #A1A1AA;
    --border: #E7E5DE;
    --border-strong: #D4D4D0;
    --accent: #A33B2A;
    --accent-hover: #8B2E20;
    --accent-soft: #FBEBE7;
    --success: #15803D;
    --success-soft: #DCFCE7;
    --warning: #B45309;
    --warning-soft: #FEF3C7;
    --danger: #B91C1C;
    --danger-soft: #FEE2E2;
    --info: #1E40AF;
    --info-soft: #DBEAFE;
  }

  * { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
  html, body { background: var(--bg); color: var(--ink); }
  body { font-family: 'Geist', ui-sans-serif, system-ui, sans-serif; font-feature-settings: "ss01", "ss03"; }

  .font-display { font-family: 'Fraunces', Georgia, serif; font-feature-settings: "ss01"; letter-spacing: -0.01em; }
  .font-mono { font-family: 'Geist Mono', ui-monospace, SFMono-Regular, monospace; }

  .ink { color: var(--ink); }
  .ink-muted { color: var(--ink-muted); }
  .ink-subtle { color: var(--ink-subtle); }
  .accent { color: var(--accent); }
  .bg-surface { background: var(--surface); }
  .bg-app { background: var(--bg); }
  .border-app { border-color: var(--border); }
  .border-strong { border-color: var(--border-strong); }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
  }
  .card-hover:hover { border-color: var(--border-strong); }

  .btn {
    display: inline-flex; align-items: center; gap: 0.5rem;
    padding: 0.5rem 0.875rem; border-radius: 8px;
    font-size: 0.875rem; font-weight: 500;
    transition: all 0.15s ease;
    border: 1px solid transparent;
    cursor: pointer;
  }
  .btn-primary { background: var(--ink); color: white; }
  .btn-primary:hover { background: #27272A; }
  .btn-accent { background: var(--accent); color: white; }
  .btn-accent:hover { background: var(--accent-hover); }
  .btn-ghost { background: transparent; color: var(--ink); border-color: var(--border); }
  .btn-ghost:hover { background: var(--bg); border-color: var(--border-strong); }
  .btn-soft { background: #F4F4F0; color: var(--ink); }
  .btn-soft:hover { background: #EDEDE7; }

  .pill {
    display: inline-flex; align-items: center; gap: 0.375rem;
    padding: 0.125rem 0.625rem; border-radius: 999px;
    font-size: 0.75rem; font-weight: 500; line-height: 1.4;
    border: 1px solid transparent;
  }
  .pill-default { background: #F4F4F0; color: var(--ink-muted); }
  .pill-success { background: var(--success-soft); color: var(--success); }
  .pill-warning { background: var(--warning-soft); color: var(--warning); }
  .pill-danger { background: var(--danger-soft); color: var(--danger); }
  .pill-info { background: var(--info-soft); color: var(--info); }
  .pill-accent { background: var(--accent-soft); color: var(--accent); }

  /* Inputs */
  .input, .select {
    width: 100%;
    padding: 0.5rem 0.75rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 0.875rem;
    color: var(--ink);
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .input:focus, .select:focus {
    outline: none;
    border-color: var(--ink);
    box-shadow: 0 0 0 3px rgba(24,24,27,0.06);
  }
  .input::placeholder { color: var(--ink-subtle); }

  /* Tab nav */
  .tab {
    padding: 0.625rem 0;
    font-size: 0.875rem;
    font-weight: 500;
    color: var(--ink-muted);
    border-bottom: 2px solid transparent;
    transition: color 0.15s, border-color 0.15s;
    cursor: pointer;
    margin-right: 1.75rem;
  }
  .tab:hover { color: var(--ink); }
  .tab-active { color: var(--ink); border-bottom-color: var(--accent); }

  /* Schedule grid table */
  .schedule-table { width: 100%; border-collapse: separate; border-spacing: 0; }
  .schedule-table th {
    text-align: left;
    padding: 0.75rem 1rem;
    font-size: 0.6875rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink-subtle);
    border-bottom: 1px solid var(--border);
  }
  .schedule-table td {
    padding: 0.875rem 1rem;
    font-size: 0.875rem;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  .schedule-table tr:last-child td { border-bottom: none; }

  /* Cell - editable */
  .role-cell {
    cursor: pointer;
    border-radius: 6px;
    padding: 0.375rem 0.5rem;
    margin: -0.375rem -0.5rem;
    transition: background 0.15s;
  }
  .role-cell:hover { background: #F4F4F0; }
  .role-cell-vacant { color: var(--ink-subtle); font-style: italic; }
  .role-cell-conflict { background: var(--danger-soft); color: var(--danger); }
  .role-cell-swapped { color: var(--info); position: relative; }
  .role-cell-swapped::after {
    content: '⇄';
    margin-left: 0.375rem;
    color: var(--info);
    font-size: 0.875em;
  }

  /* Modal */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(24,24,27,0.4);
    backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
    z-index: 50;
    padding: 1.5rem;
  }
  .modal {
    background: var(--surface);
    border-radius: 16px;
    max-width: 480px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
  }

  /* Bar chart */
  .bar-row { display: flex; align-items: center; gap: 0.75rem; padding: 0.375rem 0; }
  .bar-label { width: 200px; font-size: 0.8125rem; color: var(--ink); flex-shrink: 0; }
  .bar-track { flex: 1; height: 8px; background: #F4F4F0; border-radius: 4px; overflow: hidden; }
  .bar-fill { height: 100%; background: var(--ink); border-radius: 4px; transition: width 0.3s ease; }
  .bar-count { width: 32px; text-align: right; font-size: 0.8125rem; color: var(--ink-muted); font-variant-numeric: tabular-nums; }

  /* Print styles - matches original schedule layout */
  @media print {
    body * { visibility: hidden; }
    .print-section, .print-section * { visibility: visible; }
    .print-section {
      position: absolute; left: 0; top: 0; width: 100%;
      padding: 0;
      background: white;
    }
    .no-print { display: none !important; }
    .print-table { font-size: 11px; }
  }

  /* Smooth fade-in */
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  .fade-in { animation: fadeIn 0.2s ease-out; }

  /* Dropdown */
  .dropdown {
    position: absolute; z-index: 30;
    background: white;
    border: 1px solid var(--border);
    border-radius: 10px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    max-height: 280px;
    overflow-y: auto;
    min-width: 240px;
    padding: 0.375rem;
  }
  .dropdown-item {
    padding: 0.5rem 0.75rem;
    border-radius: 6px;
    font-size: 0.875rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: space-between;
  }
  .dropdown-item:hover { background: #F4F4F0; }
  .dropdown-item-empty { color: var(--ink-subtle); font-style: italic; padding: 0.625rem 0.75rem; font-size: 0.8125rem; }
  .dropdown-section {
    padding: 0.375rem 0.75rem 0.25rem;
    font-size: 0.6875rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink-subtle);
  }

  /* Subtle dotted divider */
  .dotted-divider {
    border-top: 1px dashed var(--border-strong);
  }

  /* Pink pill (birthdays) */
  .pill-pink { background: #FCE7F3; color: #BE185D; }

  /* Calendar grid */
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .cal-header-cell {
    background: #FBFBF7;
    padding: 0.625rem 0.5rem;
    text-align: center;
    font-size: 0.6875rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink-subtle);
  }
  .cal-day {
    background: var(--surface);
    padding: 0.5rem;
    min-height: 92px;
    display: flex;
    flex-direction: column;
    gap: 0.2rem;
    cursor: pointer;
    transition: background 0.15s;
    position: relative;
  }
  .cal-day:hover { background: #FAFAF5; }
  .cal-day-empty {
    background: #F8F8F3;
    cursor: default;
    min-height: 60px;
  }
  .cal-day-other { background: #FBFBF7; }
  .cal-day-other .cal-day-num { color: var(--ink-subtle); }
  .cal-day-today {
    background: var(--accent-soft);
    box-shadow: inset 0 0 0 2px var(--accent);
  }
  .cal-day-today:hover { background: #F8DDD7; }
  .cal-day-selected {
    background: #F4F4F0;
    box-shadow: inset 0 0 0 2px var(--ink);
  }
  .cal-day-num {
    font-size: 0.875rem;
    font-weight: 500;
    color: var(--ink);
    line-height: 1;
  }
  .cal-event {
    font-size: 0.6875rem;
    padding: 0.125rem 0.375rem;
    border-radius: 4px;
    line-height: 1.3;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    display: flex;
    align-items: center;
    gap: 0.25rem;
  }
  .cal-event-dot {
    width: 6px; height: 6px; border-radius: 50%;
    flex-shrink: 0;
  }
  .cal-service-badge {
    position: absolute;
    top: 6px; right: 6px;
    font-size: 0.625rem;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.04em;
  }
  .cal-more {
    font-size: 0.6875rem;
    color: var(--ink-muted);
    padding: 0 0.375rem;
  }
  @media (max-width: 640px) {
    .cal-day { min-height: 64px; padding: 0.25rem; }
    .cal-day-num { font-size: 0.75rem; }
    .cal-event { padding: 0.0625rem 0.25rem; font-size: 0.625rem; }
    .cal-header-cell { padding: 0.375rem 0.25rem; font-size: 0.5625rem; }
  }
</style>
</head>

const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAY_NAMES = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

function parseISODate(s) { const [y,m,d] = s.split('-').map(Number); return new Date(y, m-1, d); }
function dayOfWeek(s) { return DAY_NAMES[parseISODate(s).getDay()]; }
function monthKey(s) { return s.slice(0,7); }
function formatDateShort(s) {
  const d = parseISODate(s);
  return `${String(d.getDate()).padStart(2,'0')}-${MONTH_NAMES[d.getMonth()].slice(0,3)}`;
}
function formatMonthLabel(monthKey) {
  const [y,m] = monthKey.split('-').map(Number);
  return `${MONTH_NAMES[m-1]} ${y}`;
}
function expectedDayForService(service) { return service === 'Friday' ? 'Friday' : 'Sunday'; }

function nextMonth(monthKey) {
  let [y,m] = monthKey.split('-').map(Number);
  m += 1; if (m > 12) { m = 1; y += 1; }
  return `${y}-${String(m).padStart(2,'0')}`;
}
function prevMonth(monthKey) {
  let [y,m] = monthKey.split('-').map(Number);
  m -= 1; if (m < 1) { m = 12; y -= 1; }
  return `${y}-${String(m).padStart(2,'0')}`;
}

function workerDisplay(w) { return w ? (w.title ? `${w.title} ${w.name}` : w.name) : ''; }
function workerShort(w) { return w ? w.name : ''; }

// Find conflicts in an entry (same person assigned twice)
function entryConflicts(entry) {
  const conflicts = [];
  const assignments = ROLES_FOR_PEOPLE.map(r => ({ role: r, value: entry.roles[r] })).filter(a => a.value);
  const seen = new Map();
  for (const a of assignments) {
    if (seen.has(a.value)) {
      conflicts.push({ workerId: a.value, roles: [seen.get(a.value), a.role] });
    } else {
      seen.set(a.value, a.role);
    }
  }
  return conflicts;
}

// Suggest least-recently-used worker eligible for the role
function suggestNext(workers, schedule, role, beforeDate, excludeIds = []) {
  const eligible = workers.filter(w => w.status === 'active' && w.eligibleRoles.includes(role) && !excludeIds.includes(w.id));
  // Map worker -> last date assigned to this role
  const lastDate = new Map();
  for (const entry of schedule) {
    if (entry.date >= beforeDate) continue;
    for (const r of ROLES) {
      if (r.key === role && entry.roles[r.key]) {
        const wid = entry.roles[r.key];
        if (!lastDate.has(wid) || entry.date > lastDate.get(wid)) lastDate.set(wid, entry.date);
      }
    }
  }
  // Sort: never-assigned first, then by oldest last-assignment
  return eligible.slice().sort((a, b) => {
    const la = lastDate.get(a.id) || '0000-00-00';
    const lb = lastDate.get(b.id) || '0000-00-00';
    if (la === lb) return a.name.localeCompare(b.name);
    return la.localeCompare(lb);
  });
}

// Count assignments per worker per role across a date range
function countAssignments(workers, schedule, fromDate, toDate) {
  const counts = new Map(); // workerId -> { total, byRole: {role: count} }
  for (const w of workers) counts.set(w.id, { total: 0, byRole: {} });
  for (const entry of schedule) {
    if (entry.date < fromDate || entry.date > toDate) continue;
    for (const r of ROLES) {
      const wid = entry.roles[r.key];
      if (!wid) continue;
      const rec = counts.get(wid);
      if (!rec) continue;
      rec.total += 1;
      rec.byRole[r.key] = (rec.byRole[r.key] || 0) + 1;
    }
  }
  return counts;
}

// =============================================================================
// CALENDAR / EVENT HELPERS
// =============================================================================

function formatISODate(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, '0');
  const d = String(date.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}

function todayISO() { return formatISODate(new Date()); }

function addDays(iso, n) {
  const d = parseISODate(iso);
  d.setDate(d.getDate() + n);
  return formatISODate(d);
}

function daysInMonth(year, monthIndex) { return new Date(year, monthIndex + 1, 0).getDate(); }

// Compute occurrences of an event within a date range (inclusive)
function getEventOccurrences(event, rangeStart, rangeEnd) {
  if (!event.date) return [];
  const occurrences = [];
  const startDate = parseISODate(event.date);
  if (event.recurrence === 'none' || !event.recurrence) {
    if (event.date >= rangeStart && event.date <= rangeEnd) occurrences.push(event.date);
    return occurrences;
  }
  let cur = new Date(startDate);
  const end = parseISODate(rangeEnd);
  let safety = 2000;
  while (cur <= end && safety-- > 0) {
    const iso = formatISODate(cur);
    if (iso >= rangeStart && iso <= rangeEnd) occurrences.push(iso);
    switch (event.recurrence) {
      case 'daily':   cur.setDate(cur.getDate() + 1); break;
      case 'weekly':  cur.setDate(cur.getDate() + 7); break;
      case 'monthly': cur.setMonth(cur.getMonth() + 1); break;
      case 'yearly':  cur.setFullYear(cur.getFullYear() + 1); break;
      default: return occurrences;
    }
  }
  return occurrences;
}

// Convert worker-attached birthdays into virtual yearly events for a given range
function getWorkerBirthdayEvents(workers, rangeStart, rangeEnd) {
  const out = [];
  const startYear = parseISODate(rangeStart).getFullYear();
  const endYear = parseISODate(rangeEnd).getFullYear();
  for (const w of workers) {
    if (!w.birthday || !/^\d{2}-\d{2}$/.test(w.birthday)) continue;
    if (w.status && w.status !== 'active') continue;
    for (let y = startYear; y <= endYear; y++) {
      const iso = `${y}-${w.birthday}`;
      if (iso >= rangeStart && iso <= rangeEnd) {
        out.push({
          id: `birthday-${w.id}-${y}`,
          title: `${workerDisplay(w)}'s Birthday`,
          type: 'birthday',
          date: iso,
          startTime: null, endTime: null,
          location: '', notes: '',
          recurrence: 'yearly',
          showOnDashboard: true,  // birthdays always show on dashboard
          isAutoGenerated: true,
          linkedWorkerId: w.id,
        });
      }
    }
  }
  return out;
}

// Combine user events + worker birthdays for a range, expanded into occurrences
function getAllEventsInRange(events, workers, rangeStart, rangeEnd) {
  const out = [];
  for (const e of events) {
    const occs = getEventOccurrences(e, rangeStart, rangeEnd);
    for (const date of occs) {
      out.push({ ...e, date, _isOccurrence: date !== e.date });
    }
  }
  // Add worker birthdays
  out.push(...getWorkerBirthdayEvents(workers, rangeStart, rangeEnd));
  // Sort by date+time
  out.sort((a, b) => {
    if (a.date !== b.date) return a.date.localeCompare(b.date);
    const ta = a.startTime || '00:00';
    const tb = b.startTime || '00:00';
    return ta.localeCompare(tb);
  });
  return out;
}

// Get events on a specific date (including service days, birthdays)
function getEventsOnDate(date, events, workers, schedule) {
  const dayEvents = getAllEventsInRange(events, workers, date, date);
  const services = schedule.filter(s => s.date === date);
  return { events: dayEvents, services };
}

// =============================================================================
// ICS GENERATION (for "Save to calendar" feature)
// =============================================================================

function escapeICS(text) {
  if (!text) return '';
  return String(text).replace(/\\/g, '\\\\').replace(/\r?\n/g, '\\n').replace(/,/g, '\\,').replace(/;/g, '\\;');
}

function formatICSDateTime(year, month, day, hour, min) {
  const pad = n => String(n).padStart(2, '0');
  return `${year}${pad(month)}${pad(day)}T${pad(hour)}${pad(min)}00`;
}

function formatICSDate(iso) { return iso.replace(/-/g, ''); }

function formatICSStamp() {
  const d = new Date();
  const pad = n => String(n).padStart(2, '0');
  return `${d.getUTCFullYear()}${pad(d.getUTCMonth()+1)}${pad(d.getUTCDate())}T${pad(d.getUTCHours())}${pad(d.getUTCMinutes())}${pad(d.getUTCSeconds())}Z`;
}

function eventToVEvent(event) {
  const lines = ['BEGIN:VEVENT'];
  lines.push(`UID:${event.id}@flcc-schedule-os`);
  lines.push(`DTSTAMP:${formatICSStamp()}`);

  if (event.startTime) {
    const [y, m, d] = event.date.split('-').map(Number);
    const [sh, sm] = event.startTime.split(':').map(Number);
    lines.push(`DTSTART:${formatICSDateTime(y, m, d, sh, sm)}`);
    if (event.endTime) {
      const [eh, em] = event.endTime.split(':').map(Number);
      lines.push(`DTEND:${formatICSDateTime(y, m, d, eh, em)}`);
    } else {
      // default 1-hour duration
      lines.push(`DTEND:${formatICSDateTime(y, m, d, sh + 1, sm)}`);
    }
  } else {
    // All-day
    lines.push(`DTSTART;VALUE=DATE:${formatICSDate(event.date)}`);
    lines.push(`DTEND;VALUE=DATE:${formatICSDate(addDays(event.date, 1))}`);
  }

  lines.push(`SUMMARY:${escapeICS(event.title)}`);
  if (event.location) lines.push(`LOCATION:${escapeICS(event.location)}`);
  if (event.notes) lines.push(`DESCRIPTION:${escapeICS(event.notes)}`);

  if (event.recurrence && event.recurrence !== 'none') {
    lines.push(`RRULE:FREQ=${event.recurrence.toUpperCase()}`);
  }

  lines.push('END:VEVENT');
  return lines.join('\r\n');
}

function eventsToICSFile(events, calendarName = 'FLCC Schedule OS') {
  const lines = [
    'BEGIN:VCALENDAR',
    'VERSION:2.0',
    'PRODID:-//FLCC Schedule OS//EN',
    'CALSCALE:GREGORIAN',
    `X-WR-CALNAME:${escapeICS(calendarName)}`,
  ];
  for (const e of events) lines.push(eventToVEvent(e));
  lines.push('END:VCALENDAR');
  return lines.join('\r\n');
}

function downloadICS(filename, content) {
  const blob = new Blob([content], { type: 'text/calendar;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 100);
}

function eventTypeMeta(typeKey) {
  return EVENT_TYPES.find(t => t.key === typeKey) || EVENT_TYPES[EVENT_TYPES.length - 1];
}

// REDUCER
// =============================================================================

function reducer(state, action) {
  switch (action.type) {
    case 'HYDRATE': return action.payload;
    case 'SET_CURRENT_MONTH': return { ...state, currentMonth: action.month };
    case 'SET_THEME': return { ...state, themes: { ...state.themes, [action.month]: action.theme } };
    case 'UPDATE_ROLE': {
      const schedule = state.schedule.map(e =>
        e.id === action.entryId ? { ...e, roles: { ...e.roles, [action.role]: action.workerId } } : e
      );
      return { ...state, schedule };
    }
    case 'TOGGLE_SPECIAL': {
      const schedule = state.schedule.map(e =>
        e.id === action.entryId ? { ...e, isSpecial: !e.isSpecial, specialNote: e.isSpecial ? '' : action.note } : e
      );
      return { ...state, schedule };
    }
    case 'SET_SPECIAL_NOTE': {
      const schedule = state.schedule.map(e =>
        e.id === action.entryId ? { ...e, specialNote: action.note } : e
      );
      return { ...state, schedule };
    }
    case 'ADD_ENTRY': return { ...state, schedule: [...state.schedule, action.entry] };
    case 'REMOVE_ENTRY': return { ...state, schedule: state.schedule.filter(e => e.id !== action.entryId) };
    case 'IGNORE_DATE_MISMATCH':
      return { ...state, settings: { ...state.settings, ignoredDateMismatches: [...new Set([...state.settings.ignoredDateMismatches, action.entryId])] } };
    case 'CORRECT_DATE': {
      const schedule = state.schedule.map(e =>
        e.id === action.entryId ? { ...e, date: action.newDate, id: `${action.newDate}-${e.service.toLowerCase()}` } : e
      );
      return { ...state, schedule };
    }
    case 'ADD_WORKER': return { ...state, workers: [...state.workers, action.worker] };
    case 'UPDATE_WORKER': return { ...state, workers: state.workers.map(w => w.id === action.worker.id ? action.worker : w) };
    case 'DELETE_WORKER': return { ...state, workers: state.workers.filter(w => w.id !== action.workerId) };
    case 'IMPORT_DATA': return migrate(action.payload);
    case 'RESET': return defaultState();
    case 'ADD_EVENT': return { ...state, events: [...(state.events || []), action.event] };
    case 'UPDATE_EVENT': return { ...state, events: (state.events || []).map(e => e.id === action.event.id ? action.event : e) };
    case 'DELETE_EVENT': return { ...state, events: (state.events || []).filter(e => e.id !== action.eventId) };
    case 'TOGGLE_EVENT_DASHBOARD': return { ...state, events: (state.events || []).map(e => e.id === action.eventId ? { ...e, showOnDashboard: !e.showOnDashboard } : e) };
    case 'UPDATE_MINISTRY': return { ...state, ministry: { ...state.ministry, ...action.payload } };
    default: return state;
  }
}

// --- Worker Picker dropdown ---
function WorkerPicker({ workers, schedule, role, currentValue, onSelect, onClose, beforeDate, excludeIds, anchorRef }) {
  const [search, setSearch] = useState('');
  const [pos, setPos] = useState({ top: -9999, left: -9999, width: 280, ready: false });
  const ref = useRef(null);
  const isMobile = typeof window !== 'undefined' && window.innerWidth < 640;

  // Position the dropdown relative to the anchor cell, using fixed positioning
  // so it escapes any overflow:auto/hidden ancestors (like the table scroll container).
  useEffect(() => {
    function place() {
      if (!anchorRef?.current) return;
      const rect = anchorRef.current.getBoundingClientRect();
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      const width = vw < 640 ? Math.min(vw - 24, 320) : 280;
      let left = rect.left;
      let top = rect.bottom + 4;
      if (left + width > vw - 8) left = vw - width - 8;
      if (left < 8) left = 8;
      // Estimate height; flip up if not enough room below
      const estH = Math.min(360, vh - 16);
      if (top + estH > vh - 8) {
        const above = rect.top - estH - 4;
        top = above >= 8 ? above : Math.max(8, vh - estH - 8);
      }
      setPos({ top, left, width, ready: true });
    }
    place();
    window.addEventListener('resize', place);
    window.addEventListener('scroll', place, true);
    return () => {
      window.removeEventListener('resize', place);
      window.removeEventListener('scroll', place, true);
    };
  }, [anchorRef]);

  // Outside-click / outside-touch dismissal
  useEffect(() => {
    function onOutside(e) {
      if (ref.current && !ref.current.contains(e.target) && anchorRef?.current && !anchorRef.current.contains(e.target)) onClose();
    }
    document.addEventListener('mousedown', onOutside);
    document.addEventListener('touchstart', onOutside);
    return () => {
      document.removeEventListener('mousedown', onOutside);
      document.removeEventListener('touchstart', onOutside);
    };
  }, [onClose, anchorRef]);

  const ordered = useMemo(() => suggestNext(workers, schedule, role, beforeDate || '9999-12-31', excludeIds || []), [workers, schedule, role, beforeDate, excludeIds]);
  const everyone = workers.filter(w => w.status === 'active');
  const eligibleIds = new Set(ordered.map(w => w.id));
  const others = everyone.filter(w => !eligibleIds.has(w.id));

  const filtered = (list) => {
    const q = search.trim().toLowerCase();
    if (!q) return list;
    return list.filter(w => (w.title + ' ' + w.name).toLowerCase().includes(q));
  };

  const dropdown = (
    <div ref={ref} className="dropdown fade-in" style={{
      position: 'fixed',
      top: pos.top,
      left: pos.left,
      width: pos.width,
      zIndex: 100,
      maxHeight: '60vh',
      visibility: pos.ready ? 'visible' : 'hidden',
    }}>
      <div className="px-2 pt-1 pb-2">
        <input
          autoFocus={!isMobile}
          value={search}
          onChange={e => setSearch(e.target.value)}
          placeholder="Search workers…"
          className="input"
          style={{ fontSize: '0.8125rem' }}
        />
      </div>
      {currentValue && (
        <div className="dropdown-item" onClick={() => { onSelect(null); onClose(); }} style={{ color: 'var(--danger)' }}>
          <span>✕ Clear assignment</span>
        </div>
      )}
      <div className="dotted-divider my-1" />
      <div className="dropdown-section">Suggested (least recently used)</div>
      {filtered(ordered).length === 0 ? (
        <div className="dropdown-item-empty">No eligible workers</div>
      ) : (
        filtered(ordered).slice(0, 8).map(w => (
          <div key={w.id} className="dropdown-item" onClick={() => { onSelect(w.id); onClose(); }}>
            <span>{workerDisplay(w)}</span>
            {w.id === currentValue && <span className="ink-subtle text-xs">current</span>}
          </div>
        ))
      )}
      {filtered(ordered).length > 8 && (
        <div className="dropdown-section mt-1">Other eligible</div>
      )}
      {filtered(ordered).slice(8).map(w => (
        <div key={w.id} className="dropdown-item" onClick={() => { onSelect(w.id); onClose(); }}>
          <span>{workerDisplay(w)}</span>
        </div>
      ))}
      {filtered(others).length > 0 && (
        <>
          <div className="dropdown-section mt-1">Not typically this role</div>
          {filtered(others).slice(0, 12).map(w => (
            <div key={w.id} className="dropdown-item" onClick={() => { onSelect(w.id); onClose(); }}>
              <span className="ink-muted">{workerDisplay(w)}</span>
            </div>
          ))}
        </>
      )}
    </div>
  );

  return ReactDOM.createPortal(dropdown, document.body);
}

// --- Editable role cell ---
function RoleCell({ workers, schedule, entry, role, onChange, otherSelectedIds = [] }) {
  const [open, setOpen] = useState(false);
  const cellRef = useRef(null);
  const value = entry.roles[role];
  const worker = workers.find(w => w.id === value);

  const conflicts = entryConflicts(entry);
  const inConflict = conflicts.some(c => c.workerId === value);
  const isSwappedRole = entry.swapped && role === 'preacher'; // swap rule: blue = preacher swap

  let className = 'role-cell';
  if (inConflict) className += ' role-cell-conflict';
  else if (isSwappedRole) className += ' role-cell-swapped';
  if (!value && !entry.isSpecial) className += ' role-cell-vacant';

  const display = entry.isSpecial && role === 'preacher'
    ? <span className="font-display italic" style={{ color: 'var(--accent)' }}>{entry.specialNote || 'Special event'}</span>
    : worker ? workerShort(worker) : 'Vacant';

  return (
    <div ref={cellRef} className="relative" style={{ minWidth: 120 }}>
      <div className={className} onClick={() => setOpen(o => !o)} title={inConflict ? 'Conflict: same person twice this date' : ''}>
        {display}
      </div>
      {open && (
        <WorkerPicker
          workers={workers}
          schedule={schedule}
          role={role}
          currentValue={value}
          onSelect={(wid) => onChange(role, wid)}
          onClose={() => setOpen(false)}
          beforeDate={entry.date}
          excludeIds={otherSelectedIds}
          anchorRef={cellRef}
        />
      )}
    </div>
  );
}

// --- DASHBOARD TAB ---
function DashboardTab({ state, dispatch }) {
  const month = state.currentMonth;
  const monthEntries = state.schedule.filter(e => monthKey(e.date) === month).sort((a,b) => a.date.localeCompare(b.date));
  const fridays = monthEntries.filter(e => e.service === 'Friday');
  const sundays = monthEntries.filter(e => e.service === 'Sunday');
  const theme = state.themes[month] || '';

  // Stats
  const totalSlots = monthEntries.length * ROLES.length;
  const filled = monthEntries.reduce((acc, e) => acc + ROLES.filter(r => e.roles[r.key] || (e.isSpecial && r.key === 'preacher')).length, 0);
  const conflicts = monthEntries.flatMap(e => entryConflicts(e).map(c => ({ entry: e, conflict: c })));
  const dateMismatches = monthEntries.filter(e =>
    !state.settings.ignoredDateMismatches.includes(e.id) &&
    dayOfWeek(e.date) !== expectedDayForService(e.service)
  );
  const swapped = monthEntries.filter(e => e.swapped);

  return (
    <div className="fade-in">
      <SectionHeading eyebrow={`Currently viewing · ${formatMonthLabel(month)}`} title="Dashboard">
        Quick read on this month: theme, completeness, conflicts, swaps, and date issues.
      </SectionHeading>

      {/* Theme banner */}
      <div className="card p-6 mb-6">
        <div className="flex items-center justify-between gap-4 flex-wrap">
          <div>
            <div className="text-xs font-medium tracking-widest uppercase ink-subtle">Monthly Theme</div>
            <div className="font-display text-2xl font-semibold mt-1">{theme || <span className="ink-subtle italic font-normal">No theme set</span>}</div>
          </div>
          <div className="flex items-center gap-2">
            <button className="btn btn-ghost" onClick={() => dispatch({ type: 'SET_CURRENT_MONTH', month: prevMonth(month) })}>← Prev</button>
            <button className="btn btn-ghost" onClick={() => dispatch({ type: 'SET_CURRENT_MONTH', month: nextMonth(month) })}>Next →</button>
          </div>
        </div>
      </div>

      {/* Stats */}
      <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
        <StatCard label="Service Dates" value={monthEntries.length} sub={`${fridays.length} Fri · ${sundays.length} Sun`} />
        <StatCard label="Slots Filled" value={`${filled}/${totalSlots}`} sub={totalSlots === 0 ? '—' : `${Math.round(100*filled/totalSlots)}% complete`} tone={filled === totalSlots && totalSlots > 0 ? 'success' : (totalSlots > 0 && filled/totalSlots > 0.8 ? 'warning' : 'default')} />
        <StatCard label="Conflicts" value={conflicts.length} sub={conflicts.length === 0 ? 'All clean' : 'Same person, two roles'} tone={conflicts.length === 0 ? 'success' : 'danger'} />
        <StatCard label="Swaps" value={swapped.length} sub={swapped.length === 0 ? 'No swaps' : 'Marked exchanges'} tone={swapped.length > 0 ? 'info' : 'default'} />
      </div>

      {/* Issues */}
      {(conflicts.length > 0 || dateMismatches.length > 0) && (
        <div className="card p-6 mb-6 fade-in" style={{ borderColor: 'var(--danger-soft)' }}>
          <div className="text-xs font-medium tracking-widest uppercase mb-3" style={{ color: 'var(--danger)' }}>Needs Attention</div>
          <div className="space-y-3">
            {conflicts.map((c, i) => {
              const w = state.workers.find(x => x.id === c.conflict.workerId);
              const r1 = ROLES.find(r => r.key === c.conflict.roles[0])?.label;
              const r2 = ROLES.find(r => r.key === c.conflict.roles[1])?.label;
              return (
                <div key={i} className="flex items-start gap-3 text-sm">
                  <Pill tone="danger">Conflict</Pill>
                  <div>
                    <span className="font-medium">{formatDateShort(c.entry.date)} {c.entry.service}</span>
                    <span className="ink-muted"> — {workerDisplay(w)} is assigned both <em>{r1}</em> and <em>{r2}</em>.</span>
                  </div>
                </div>
              );
            })}
            {dateMismatches.map((e, i) => (
              <div key={`dm-${i}`} className="flex items-start gap-3 text-sm">
                <Pill tone="warning">Date Issue</Pill>
                <div className="flex-1">
                  <span className="font-medium">{formatDateShort(e.date)}</span>
                  <span className="ink-muted"> — labelled <em>{e.service}</em> but {e.date} is a <em>{dayOfWeek(e.date)}</em>.</span>
                  <div className="mt-1 flex gap-2">
                    <button className="btn btn-soft text-xs" onClick={() => {
                      // shift to nearest expected day
                      const expected = expectedDayForService(e.service);
                      const expectedIdx = DAY_NAMES.indexOf(expected);
                      const cur = parseISODate(e.date);
                      const diff = expectedIdx - cur.getDay();
                      const adjusted = new Date(cur); adjusted.setDate(cur.getDate() + diff);
                      const newDate = `${adjusted.getFullYear()}-${String(adjusted.getMonth()+1).padStart(2,'0')}-${String(adjusted.getDate()).padStart(2,'0')}`;
                      dispatch({ type: 'CORRECT_DATE', entryId: e.id, newDate });
                    }}>Correct to nearest {expectedDayForService(e.service)}</button>
                    <button className="btn btn-ghost text-xs" onClick={() => dispatch({ type: 'IGNORE_DATE_MISMATCH', entryId: e.id })}>Keep as-is</button>
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Glance grid */}
      <div className="grid md:grid-cols-2 gap-4">
        <ServiceGlance title="Friday Service" entries={fridays} workers={state.workers} />
        <ServiceGlance title="Sunday Service" entries={sundays} workers={state.workers} />
      </div>

      {/* Calendar cards */}
      <div className="grid md:grid-cols-2 gap-4 mt-4">
        <UpcomingEventsCard state={state} />
        <BirthdaysThisMonthCard state={state} />
      </div>

      {monthEntries.length === 0 && (
        <div className="card p-8 mt-6 text-center">
          <div className="font-display text-xl mb-2">No schedule for {formatMonthLabel(month)} yet</div>
          <p className="ink-muted text-sm mb-4">Head to the Schedule tab to add Friday and Sunday service dates.</p>
        </div>
      )}
    </div>
  );
}

function ScheduleRow({ entry, state, dispatch }) {
  const [menuOpen, setMenuOpen] = useState(false);
  const [menuPos, setMenuPos] = useState({ top: 0, left: 0, ready: false });
  const menuBtnRef = useRef(null);
  const menuRef = useRef(null);
  const handleRoleChange = (role, wid) => dispatch({ type: 'UPDATE_ROLE', entryId: entry.id, role, workerId: wid });
  const dayMismatch = dayOfWeek(entry.date) !== expectedDayForService(entry.service) && !state.settings.ignoredDateMismatches.includes(entry.id);

  useEffect(() => {
    if (!menuOpen) return;
    function place() {
      if (!menuBtnRef.current) return;
      const rect = menuBtnRef.current.getBoundingClientRect();
      const width = 220;
      let left = rect.right - width;
      let top = rect.bottom + 4;
      if (left < 8) left = 8;
      if (top + 120 > window.innerHeight) top = Math.max(8, rect.top - 120 - 4);
      setMenuPos({ top, left, ready: true });
    }
    place();
    function onOutside(e) {
      if (menuRef.current && !menuRef.current.contains(e.target) && menuBtnRef.current && !menuBtnRef.current.contains(e.target)) setMenuOpen(false);
    }
    document.addEventListener('mousedown', onOutside);
    document.addEventListener('touchstart', onOutside);
    window.addEventListener('resize', place);
    window.addEventListener('scroll', place, true);
    return () => {
      document.removeEventListener('mousedown', onOutside);
      document.removeEventListener('touchstart', onOutside);
      window.removeEventListener('resize', place);
      window.removeEventListener('scroll', place, true);
    };
  }, [menuOpen]);

  return (
    <tr>
      <td>
        <div className="font-mono text-xs">{formatDateShort(entry.date)}</div>
        <div className="text-xs ink-subtle mt-0.5">{dayOfWeek(entry.date)}</div>
        {dayMismatch && <Pill tone="warning" className="mt-1">⚠ {expectedDayForService(entry.service).slice(0,3)}?</Pill>}
        {entry.isSpecial && <Pill tone="accent" className="mt-1">Special</Pill>}
        {entry.swapped && <Pill tone="info" className="mt-1">⇄ Swap</Pill>}
      </td>
      <td><RoleCell workers={state.workers} schedule={state.schedule} entry={entry} role="presider" onChange={handleRoleChange} /></td>
      <td><RoleCell workers={state.workers} schedule={state.schedule} entry={entry} role="songLeader" onChange={handleRoleChange} /></td>
      <td><RoleCell workers={state.workers} schedule={state.schedule} entry={entry} role="preacher" onChange={handleRoleChange} /></td>
      <td><RoleCell workers={state.workers} schedule={state.schedule} entry={entry} role="pastoralPrayer" onChange={handleRoleChange} /></td>
      <td><RoleCell workers={state.workers} schedule={state.schedule} entry={entry} role="communionAssistant1" onChange={handleRoleChange} otherSelectedIds={[entry.roles.communionAssistant2].filter(Boolean)} /></td>
      <td><RoleCell workers={state.workers} schedule={state.schedule} entry={entry} role="communionAssistant2" onChange={handleRoleChange} otherSelectedIds={[entry.roles.communionAssistant1].filter(Boolean)} /></td>
      <td><RoleCell workers={state.workers} schedule={state.schedule} entry={entry} role="foodInCharge" onChange={handleRoleChange} /></td>
      <td>
        <button ref={menuBtnRef} className="btn btn-ghost text-xs" onClick={() => setMenuOpen(!menuOpen)}>⋯</button>
        {menuOpen && ReactDOM.createPortal(
          <div ref={menuRef} className="dropdown fade-in" style={{
            position: 'fixed', top: menuPos.top, left: menuPos.left, width: 220,
            zIndex: 100, visibility: menuPos.ready ? 'visible' : 'hidden'
          }}>
            <div className="dropdown-item" onClick={() => {
              const note = entry.isSpecial ? '' : prompt('Special event note (e.g. "Seven Last Words"):', entry.specialNote) || '';
              if (entry.isSpecial || note) dispatch({ type: 'TOGGLE_SPECIAL', entryId: entry.id, note });
              setMenuOpen(false);
            }}>{entry.isSpecial ? 'Remove special-event flag' : 'Mark as special event'}</div>
            <div className="dropdown-item" onClick={() => {
              if (confirm(`Delete ${formatDateShort(entry.date)} ${entry.service}?`)) dispatch({ type: 'REMOVE_ENTRY', entryId: entry.id });
              setMenuOpen(false);
            }} style={{ color: 'var(--danger)' }}>Delete date</div>
          </div>,
          document.body
        )}
      </td>
    </tr>
  );
}

    <div className="modal-backdrop" onClick={onClose}>

  );

    <div className="modal-backdrop" onClick={onClose}>

// --- FAIRNESS TAB ---
function FairnessTab({ state }) {
  const months = Object.keys(state.themes).sort();
  const [from, setFrom] = useState(months[0] || '2026-02');
  const [to, setTo] = useState(months[months.length - 1] || '2026-06');
  const [roleFilter, setRoleFilter] = useState('all');

  const counts = countAssignments(state.workers, state.schedule, `${from}-01`, `${to}-31`);

  const rows = state.workers
    .filter(w => w.status === 'active')
    .map(w => {
      const c = counts.get(w.id) || { total: 0, byRole: {} };
      const value = roleFilter === 'all' ? c.total : (c.byRole[roleFilter] || 0);
      return { worker: w, value };
    })
    .filter(r => r.value > 0 || roleFilter === 'all')
    .sort((a, b) => b.value - a.value);

  const max = Math.max(1, ...rows.map(r => r.value));

  return (
    <div className="fade-in">
      <SectionHeading eyebrow="Load distribution" title="Fairness">
        Who's been carrying the rotation, and who's overdue. Filter by role to spot specialists.
      </SectionHeading>

      <div className="card p-4 mb-6 flex items-center gap-3 flex-wrap">
        <div className="flex items-center gap-2">
          <span className="text-xs ink-subtle">From</span>
          <select className="select" style={{ width: 'auto' }} value={from} onChange={e => setFrom(e.target.value)}>
            {months.map(m => <option key={m} value={m}>{formatMonthLabel(m)}</option>)}
          </select>
          <span className="text-xs ink-subtle">to</span>
          <select className="select" style={{ width: 'auto' }} value={to} onChange={e => setTo(e.target.value)}>
            {months.map(m => <option key={m} value={m}>{formatMonthLabel(m)}</option>)}
          </select>
        </div>
        <div className="flex-1" />
        <select className="select" style={{ width: 'auto' }} value={roleFilter} onChange={e => setRoleFilter(e.target.value)}>
          <option value="all">All roles</option>
          {ROLES.map(r => <option key={r.key} value={r.key}>{r.label}</option>)}
        </select>
      </div>

      <div className="card p-6">
        {rows.length === 0 ? (
          <div className="ink-subtle italic text-center py-8">No assignments in this range.</div>
        ) : (
          <div>
            {rows.map(({ worker, value }) => (
              <div key={worker.id} className="bar-row">
                <div className="bar-label">{workerDisplay(worker)}</div>
                <div className="bar-track"><div className="bar-fill" style={{ width: `${(value/max)*100}%` }}></div></div>
                <div className="bar-count">{value}</div>
              </div>
            ))}
          </div>
        )}
      </div>

      <div className="mt-4 text-xs ink-muted">
        Tip: workers with 0 in this range are good candidates when you need to spread the load. The Schedule tab's dropdowns already sort least-recently-used first.
      </div>
    </div>
  );
}

  const sundays = monthEntries.filter(e => e.service === 'Sunday');

  // Collect monthly communion pairs (from first entry of each service)
  const fridayCommunion = fridays.length ? [fridays[0].roles.communionAssistant1, fridays[0].roles.communionAssistant2].filter(Boolean) : [];
  const sundayCommunion = sundays.length ? [sundays[0].roles.communionAssistant1, sundays[0].roles.communionAssistant2].filter(Boolean) : [];

  const wDisplay = (id) => {
    const w = state.workers.find(x => x.id === id);

    return workerDisplay(w).toUpperCase();

    <div className="fade-in">

        </div>
      </div>

      {/* The actual printable section */}

        <div className="text-center mb-6">
          <div className="font-display text-3xl font-bold" style={{ color: 'var(--accent)', letterSpacing: '0.02em' }}>{state.meta.churchName}</div>
          <div className="text-sm font-semibold mt-1" style={{ color: 'var(--accent)' }}>WORKER'S SCHEDULE — {formatMonthLabel(month).toUpperCase()}</div>
          {theme && <div className="text-xs font-semibold mt-1" style={{ color: 'var(--info)' }}>THEME: {theme}</div>}
        </div>

        <table className="print-table w-full" style={{ borderCollapse: 'collapse', border: '1px solid #999' }}>
          <thead>
            <tr style={{ background: '#D4D4D0' }}>
              <th style={th}>DATE</th>
              <th style={th}>PRESIDER</th>
              <th style={th}>SONG LEADER</th>
              <th style={th}>PREACHER</th>
              <th style={th}>PASTORAL PRAYER</th>
              <th style={th}>FOOD-IN-CHARGE</th>
            </tr>
          </thead>

            {fridays.length > 0 && (
              <>
                <tr><td colSpan="6" style={{ ...td, fontStyle: 'italic', fontWeight: 600, background: '#FAFAF5' }}>FRIDAY SERVICE</td></tr>
                <tr><td colSpan="6" style={{ ...td, fontStyle: 'italic', color: '#1E40AF', background: '#FAFAF5' }}>
                  Communion Assistant: {fridayCommunion.map(id => state.workers.find(w => w.id === id)).filter(Boolean).map(w => workerDisplay(w)).join(' & ') || '—'}
                </td></tr>
                {fridays.map(e => <PrintRow key={e.id} entry={e} workers={state.workers} wDisplay={wDisplay} />)}
              </>
            )}
            {sundays.length > 0 && (
              <>
                <tr><td colSpan="6" style={{ ...td, fontStyle: 'italic', fontWeight: 600, background: '#FAFAF5' }}>SUNDAY SERVICE</td></tr>
                <tr><td colSpan="6" style={{ ...td, fontStyle: 'italic', color: '#1E40AF', background: '#FAFAF5' }}>

const th = { padding: '6px 8px', fontSize: '11px', fontWeight: 600, border: '1px solid #999', textAlign: 'left' };
const td = { padding: '6px 8px', fontSize: '11px', border: '1px solid #999' };

function PrintRow({ entry, workers, wDisplay }) {
  const food = workers.find(w => w.id === entry.roles.foodInCharge);
  const preacherDisplay = entry.isSpecial ? `"${entry.specialNote || 'SPECIAL'}"` : wDisplay(entry.roles.preacher);
  return (
    <tr>
      <td style={td}>{formatDateShort(entry.date)}</td>
      <td style={td}>{wDisplay(entry.roles.presider)}</td>
      <td style={td}>{wDisplay(entry.roles.songLeader)}</td>
      <td style={{ ...td, color: entry.swapped ? '#1E40AF' : 'inherit' }}>{preacherDisplay}</td>
      <td style={td}>{wDisplay(entry.roles.pastoralPrayer)}</td>
      <td style={td}>{food ? food.name.toUpperCase() : '—'}</td>
    </tr>
  );
}

function generateMessengerText(state, month) {
  const monthEntries = state.schedule.filter(e => monthKey(e.date) === month).sort((a,b) => a.date.localeCompare(b.date));
  const theme = state.themes[month] || '';
  const wd = (id) => {
    const w = state.workers.find(x => x.id === id);
    return w ? workerDisplay(w) : '—';
  };
  let out = `📅 ${state.meta.churchName}\n`;
  out += `WORKER'S SCHEDULE — ${formatMonthLabel(month).toUpperCase()}\n`;
  if (theme) out += `THEME: ${theme}\n`;
  out += '\n';
  for (const service of ['Friday','Sunday']) {
    const entries = monthEntries.filter(e => e.service === service);
    if (entries.length === 0) continue;
    out += `🔹 ${service.toUpperCase()} SERVICE\n`;
    const com = entries[0];
    if (com.roles.communionAssistant1 || com.roles.communionAssistant2) {
      out += `Communion: ${[com.roles.communionAssistant1, com.roles.communionAssistant2].map(wd).filter(x => x !== '—').join(' & ')}\n`;
    }
    for (const e of entries) {
      out += `\n${formatDateShort(e.date)} (${dayOfWeek(e.date)})\n`;
      out += `• Presider: ${wd(e.roles.presider)}\n`;
      out += `• Song: ${wd(e.roles.songLeader)}\n`;
      out += `• Preacher: ${e.isSpecial ? `"${e.specialNote}"` : wd(e.roles.preacher)}${e.swapped ? ' ⇄' : ''}\n`;
      out += `• Pastoral Prayer: ${wd(e.roles.pastoralPrayer)}\n`;
      out += `• Food: ${wd(e.roles.foodInCharge)}\n`;
    }
    out += '\n';
  }
  return out.trim();
}

      </div>

      <div className="grid md:grid-cols-2 gap-4 mb-6">
        <div className="card p-6">
          <div className="font-display text-xl font-semibold mb-2">Admin Backup (Export)</div>
          <p className="ink-muted text-sm mb-4">Full admin backup with all settings. Send to your fellowship coordinator via FB Messenger to keep both of you in sync.</p>
          <button className="btn btn-primary" onClick={exportData}>↓ Download admin JSON</button>
        </div>
        <div className="card p-6">
          <div className="font-display text-xl font-semibold mb-2">Import</div>
          <p className="ink-muted text-sm mb-4">Replace your current data with an exported file. Useful when your coordinator sends back the latest version.</p>
          <input ref={fileInputRef} type="file" accept=".json" className="hidden" onChange={(e) => e.target.files[0] && importData(e.target.files[0])} />
          <button className="btn btn-soft" onClick={() => fileInputRef.current?.click()}>↑ Choose JSON file</button>
        </div>
      </div>

      <div className="card p-6">
        <div className="font-display text-xl font-semibold mb-2">Reset</div>
        <p className="ink-muted text-sm mb-4">Restore the original seed data (4 months historical + June blank). This deletes any changes you've made in this browser.</p>
        <button className="btn btn-ghost" style={{ color: 'var(--danger)' }} onClick={() => {
          if (confirm('Reset to seed data? All your changes will be lost.')) dispatch({ type: 'RESET' });
        }}>↺ Reset to seed data</button>
      </div>

      <div className="mt-6 text-xs ink-muted">
        Last updated: {new Date(state.meta.lastUpdated).toLocaleString()} · Version {state.meta.version}
      </div>
    </div>
  );
}

// CALENDAR TAB
// =============================================================================

function CalendarTab({ state, dispatch }) {
  const month = state.currentMonth;
  const [year, monthIdx] = useMemo(() => {
    const [y, m] = month.split('-').map(Number);
    return [y, m - 1];
  }, [month]);

  const [selectedDate, setSelectedDate] = useState(null);
  const [editingEvent, setEditingEvent] = useState(null);

  // Range: month ± buffer for grid display
  const firstDay = `${month}-01`;
  const lastDay = `${month}-${String(daysInMonth(year, monthIdx)).padStart(2, '0')}`;
  const gridStart = (() => {
    const d = parseISODate(firstDay);
    d.setDate(d.getDate() - d.getDay()); // back to Sunday
    return formatISODate(d);
  })();
  const gridEnd = (() => {
    const d = parseISODate(lastDay);
    d.setDate(d.getDate() + (6 - d.getDay())); // forward to Saturday
    return formatISODate(d);
  })();

  const allEvents = useMemo(
    () => getAllEventsInRange(state.events || [], state.workers, gridStart, gridEnd),
    [state.events, state.workers, gridStart, gridEnd]
  );

  const eventsByDate = useMemo(() => {
    const m = new Map();
    for (const e of allEvents) {
      if (!m.has(e.date)) m.set(e.date, []);
      m.get(e.date).push(e);
    }
    return m;
  }, [allEvents]);

  const servicesByDate = useMemo(() => {
    const m = new Map();
    for (const s of state.schedule) {
      if (!m.has(s.date)) m.set(s.date, []);
      m.get(s.date).push(s);
    }
    return m;
  }, [state.schedule]);

  // Build the grid (always 6 weeks = 42 cells for stable layout)
  const cells = [];
  let cur = parseISODate(gridStart);
  for (let i = 0; i < 42; i++) {
    cells.push(formatISODate(cur));
    cur.setDate(cur.getDate() + 1);
  }

  const today = todayISO();

  // Upcoming events list: from today, next 60 days
  const upcomingFrom = today;
  const upcomingTo = addDays(today, 60);
  const upcoming = useMemo(
    () => getAllEventsInRange(state.events || [], state.workers, upcomingFrom, upcomingTo),
    [state.events, state.workers, upcomingFrom, upcomingTo]
  );

  const exportAllToICS = () => {
    const userEvents = state.events || [];
    const birthdays = (state.workers || [])
      .filter(w => w.birthday && /^\d{2}-\d{2}$/.test(w.birthday))
      .map(w => ({
        id: `birthday-${w.id}`,
        title: `${workerDisplay(w)}'s Birthday`,
        type: 'birthday',
        date: `${new Date().getFullYear()}-${w.birthday}`,
        startTime: null, endTime: null, location: '', notes: 'Auto-generated from FLCC roster',
        recurrence: 'yearly',
      }));
    const all = [...userEvents, ...birthdays];
    if (all.length === 0) { alert('No events to export yet.'); return; }
    const ics = eventsToICSFile(all, `${state.meta.churchName} Calendar`);
    downloadICS(`flcc-calendar-${todayISO()}.ics`, ics);
  };

  return (
    <div className="fade-in">
      <SectionHeading eyebrow="Activities & birthdays" title="Calendar">
        Bible studies, prayer meetings, fellowship gatherings, and worker birthdays. Save any event to your phone calendar with one tap.
      </SectionHeading>

      {/* Month controls */}
      <div className="card p-5 mb-6">
        <div className="flex items-center justify-between gap-4 flex-wrap">
          <div className="flex items-center gap-3">
            <button className="btn btn-ghost" onClick={() => dispatch({ type: 'SET_CURRENT_MONTH', month: prevMonth(month) })}>←</button>
            <div className="font-display text-2xl font-semibold">{formatMonthLabel(month)}</div>
            <button className="btn btn-ghost" onClick={() => dispatch({ type: 'SET_CURRENT_MONTH', month: nextMonth(month) })}>→</button>
            <button className="btn btn-soft text-xs" onClick={() => dispatch({ type: 'SET_CURRENT_MONTH', month: monthKey(today) })}>Today</button>
          </div>
          <div className="flex items-center gap-2">
            <button className="btn btn-ghost text-xs" onClick={exportAllToICS} title="Download .ics for Apple/Google calendars">📅 Export all</button>
            <button className="btn btn-accent" onClick={() => setEditingEvent({
              id: null, title: '', type: 'bible-study',
              date: selectedDate || todayISO(),
              startTime: '19:00', endTime: '21:00',
              location: '', notes: '',
              recurrence: 'none', showOnDashboard: false,
            })}>+ Add Event</button>
          </div>
        </div>

        {/* Legend */}
        <div className="mt-4 flex flex-wrap gap-3 text-xs ink-muted">
          {EVENT_TYPES.map(t => (
            <div key={t.key} className="flex items-center gap-1.5">
              <span className="cal-event-dot" style={{ background: t.dot }}></span>
              {t.label}
            </div>
          ))}
          <div className="flex items-center gap-1.5">
            <span style={{ color: 'var(--accent)', fontWeight: 600, fontSize: '0.625rem' }}>FRI/SUN</span>
            <span>Service day</span>
          </div>
        </div>
      </div>

      {/* Month grid */}
      <div className="cal-grid mb-6">
        {['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d => (
          <div key={d} className="cal-header-cell">{d}</div>
        ))}
        {cells.map(date => {
          const isOtherMonth = monthKey(date) !== month;
          const isToday = date === today;
          const isSelected = date === selectedDate;
          const dayEvents = eventsByDate.get(date) || [];
          const services = servicesByDate.get(date) || [];
          let cls = 'cal-day';
          if (isOtherMonth) cls += ' cal-day-other';
          if (isToday) cls += ' cal-day-today';
          else if (isSelected) cls += ' cal-day-selected';

          return (
            <div key={date} className={cls} onClick={() => setSelectedDate(date === selectedDate ? null : date)}>
              <div className="flex items-start justify-between">
                <span className="cal-day-num">{parseISODate(date).getDate()}</span>
              </div>
              {services.length > 0 && (
                <div className="cal-service-badge">{services[0].service.toUpperCase().slice(0,3)}</div>
              )}
              <div style={{ display: 'flex', flexDirection: 'column', gap: '2px', overflow: 'hidden' }}>
                {dayEvents.slice(0, 3).map(e => {
                  const meta = eventTypeMeta(e.type);
                  return (
                    <div key={e.id} className="cal-event" style={{ background: meta.dot + '20', color: meta.dot }} title={e.title}>
                      <span className="cal-event-dot" style={{ background: meta.dot }}></span>
                      <span style={{ overflow: 'hidden', textOverflow: 'ellipsis' }}>{e.title}</span>
                    </div>
                  );
                })}
                {dayEvents.length > 3 && (
                  <div className="cal-more">+{dayEvents.length - 3} more</div>
                )}
              </div>
            </div>
          );
        })}
      </div>

      {/* Selected day detail */}
      {selectedDate && (
        <div className="card p-5 mb-6 fade-in">
          <div className="flex items-center justify-between mb-3">
            <div>
              <div className="text-xs font-medium tracking-widest uppercase ink-subtle">Selected day</div>
              <div className="font-display text-xl font-semibold mt-1">
                {parseISODate(selectedDate).toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' })}
              </div>
            </div>
            <button className="btn btn-soft text-xs" onClick={() => setEditingEvent({
              id: null, title: '', type: 'bible-study',
              date: selectedDate,
              startTime: '19:00', endTime: '21:00',
              location: '', notes: '',
              recurrence: 'none', showOnDashboard: false,
            })}>+ Add on this day</button>
          </div>
          <DayEventList
            date={selectedDate}
            state={state}
            dispatch={dispatch}
            onEdit={(e) => setEditingEvent(e)}
          />
        </div>
      )}

      {/* Upcoming list */}
      <div className="card p-5">
        <div className="text-xs font-medium tracking-widest uppercase ink-subtle mb-3">Upcoming · next 60 days</div>
        {upcoming.length === 0 ? (
          <div className="ink-subtle italic text-sm">No upcoming events. Click "+ Add Event" above to get started.</div>
        ) : (
          <div className="space-y-2">
            {upcoming.map((e, i) => {
              const meta = eventTypeMeta(e.type);
              const dateLabel = parseISODate(e.date).toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
              return (
                <div key={`${e.id}-${i}`} className="flex items-center gap-3 py-2" style={{ borderBottom: '1px dashed var(--border-strong)' }}>
                  <div className="font-mono text-xs ink-muted" style={{ width: 90, flexShrink: 0 }}>{dateLabel}</div>
                  <span className="cal-event-dot" style={{ background: meta.dot, flexShrink: 0 }}></span>
                  <div className="flex-1 min-w-0">
                    <div className="text-sm font-medium truncate">{e.title}</div>
                    <div className="text-xs ink-muted">
                      {e.startTime ? `${e.startTime}${e.endTime ? '–' + e.endTime : ''}` : 'All day'}
                      {e.location ? ` · ${e.location}` : ''}
                    </div>
                  </div>
                  <div className="flex items-center gap-1">
                    {!e.isAutoGenerated && (
                      <button className="btn btn-ghost text-xs" onClick={() => {
                        const userEvent = (state.events || []).find(x => x.id === e.id);
                        if (userEvent) setEditingEvent({ ...userEvent });
                      }}>Edit</button>
                    )}
                    <button className="btn btn-ghost text-xs" title="Save to phone calendar" onClick={() => {
                      const ics = eventsToICSFile([e], e.title);
                      downloadICS(`${e.title.replace(/[^a-z0-9]+/gi, '-').toLowerCase()}.ics`, ics);
                    }}>📅</button>
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>

      {editingEvent && (
        <EventModal
          event={editingEvent}
          state={state}
          onSave={(ev) => {
            if (ev.id) dispatch({ type: 'UPDATE_EVENT', event: ev });
            else dispatch({ type: 'ADD_EVENT', event: { ...ev, id: `evt-${Date.now()}` } });
            setEditingEvent(null);
          }}
          onDelete={(id) => {
            if (confirm('Delete this event? This cannot be undone.')) {
              dispatch({ type: 'DELETE_EVENT', eventId: id });
              setEditingEvent(null);
            }
          }}
          onClose={() => setEditingEvent(null)}
        />
      )}
    </div>
  );
}

function DayEventList({ date, state, dispatch, onEdit }) {
  const items = getAllEventsInRange(state.events || [], state.workers, date, date);
  const services = state.schedule.filter(s => s.date === date);

  if (items.length === 0 && services.length === 0) {
    return <div className="ink-subtle italic text-sm">Nothing scheduled.</div>;
  }

  return (
    <div className="space-y-2">
      {services.map(s => {
        const presider = state.workers.find(w => w.id === s.roles.presider);
        const preacher = state.workers.find(w => w.id === s.roles.preacher);
        return (
          <div key={s.id} className="flex items-center gap-3 py-2 px-3 rounded-md" style={{ background: 'var(--accent-soft)' }}>
            <span className="text-xs font-semibold" style={{ color: 'var(--accent)', letterSpacing: '0.04em' }}>{s.service.toUpperCase()}</span>
            <div className="flex-1 text-sm">
              <span className="ink-muted">Service · </span>
              {s.isSpecial ? <em>{s.specialNote}</em> : (preacher ? `Preacher: ${workerShort(preacher)}` : 'Preacher TBD')}
              {presider && <span className="ink-muted"> · Presider: {workerShort(presider)}</span>}
            </div>
          </div>
        );
      })}
      {items.map(e => {
        const meta = eventTypeMeta(e.type);
        return (
          <div key={e.id} className="flex items-center gap-3 py-2 px-3 rounded-md" style={{ background: meta.dot + '12' }}>
            <span className="cal-event-dot" style={{ background: meta.dot }}></span>
            <div className="flex-1">
              <div className="text-sm font-medium">{e.title}</div>
              <div className="text-xs ink-muted">
                {e.startTime ? `${e.startTime}${e.endTime ? '–' + e.endTime : ''}` : 'All day'}
                {e.location ? ` · ${e.location}` : ''}
                {e.recurrence && e.recurrence !== 'none' ? ` · repeats ${e.recurrence}` : ''}
              </div>
            </div>
            <div className="flex items-center gap-1">
              {!e.isAutoGenerated && (
                <button className="btn btn-ghost text-xs" onClick={() => {
                  const userEvent = (state.events || []).find(x => x.id === e.id);
                  if (userEvent) onEdit({ ...userEvent });
                }}>Edit</button>
              )}
              <button className="btn btn-ghost text-xs" onClick={() => {
                const ics = eventsToICSFile([e], e.title);
                downloadICS(`${e.title.replace(/[^a-z0-9]+/gi, '-').toLowerCase()}.ics`, ics);
              }} title="Save to phone calendar">📅</button>
            </div>
          </div>
        );
      })}
    </div>
  );
}

function EventModal({ event, state, onSave, onDelete, onClose }) {
  const [e, setE] = useState(event);

  const submit = () => {
    if (!e.title.trim()) { alert('Title is required.'); return; }
    if (!/^\d{4}-\d{2}-\d{2}$/.test(e.date)) { alert('Valid date is required.'); return; }
    onSave(e);
  };

  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal p-6 fade-in" onClick={ev => ev.stopPropagation()} style={{ maxWidth: 540 }}>
        <h3 className="font-display text-2xl font-semibold mb-4">{e.id ? 'Edit Event' : 'New Event'}</h3>
        <div className="space-y-3">
          <div>
            <label className="text-xs font-medium tracking-widest uppercase ink-subtle">Title</label>
            <input className="input mt-1" value={e.title} onChange={ev => setE({ ...e, title: ev.target.value })} placeholder="e.g. Wednesday Bible Study" autoFocus />
          </div>

          <div>
            <label className="text-xs font-medium tracking-widest uppercase ink-subtle">Type</label>
            <select className="select mt-1" value={e.type} onChange={ev => setE({ ...e, type: ev.target.value })}>
              {EVENT_TYPES.map(t => <option key={t.key} value={t.key}>{t.label}</option>)}
            </select>
          </div>

          <div className="grid grid-cols-1 sm:grid-cols-3 gap-2">
            <div>
              <label className="text-xs font-medium tracking-widest uppercase ink-subtle">Date</label>
              <input className="input mt-1" type="date" value={e.date} onChange={ev => setE({ ...e, date: ev.target.value })} />
            </div>
            <div>
              <label className="text-xs font-medium tracking-widest uppercase ink-subtle">Start time</label>
              <input className="input mt-1" type="time" value={e.startTime || ''} onChange={ev => setE({ ...e, startTime: ev.target.value || null })} placeholder="All day" />
            </div>
            <div>
              <label className="text-xs font-medium tracking-widest uppercase ink-subtle">End time</label>
              <input className="input mt-1" type="time" value={e.endTime || ''} onChange={ev => setE({ ...e, endTime: ev.target.value || null })} placeholder="optional" />
            </div>
          </div>
          <div className="text-xs ink-muted -mt-1">Leave times blank for all-day events.</div>

          <div>
            <label className="text-xs font-medium tracking-widest uppercase ink-subtle">Repeats</label>
            <select className="select mt-1" value={e.recurrence || 'none'} onChange={ev => setE({ ...e, recurrence: ev.target.value })}>
              {RECURRENCE_TYPES.map(t => (
                <option key={t.key} value={t.key}>
                  {t.key === 'weekly' && e.date ? `Weekly on ${parseISODate(e.date).toLocaleDateString('en-US', { weekday: 'long' })}s` :
                   t.key === 'yearly' && e.date ? `Yearly on ${parseISODate(e.date).toLocaleDateString('en-US', { month: 'long', day: 'numeric' })}` :
                   t.key === 'monthly' && e.date ? `Monthly on the ${parseISODate(e.date).getDate()}${getOrdinalSuffix(parseISODate(e.date).getDate())}` :
                   t.label}
                </option>
              ))}
            </select>
          </div>

          <div>
            <label className="text-xs font-medium tracking-widest uppercase ink-subtle">Location</label>
            <input className="input mt-1" value={e.location || ''} onChange={ev => setE({ ...e, location: ev.target.value })} placeholder="e.g. FLCC - Farwaniya 1" />
          </div>

          <div>
            <label className="text-xs font-medium tracking-widest uppercase ink-subtle">Notes</label>
            <textarea className="input mt-1" rows={2} value={e.notes || ''} onChange={ev => setE({ ...e, notes: ev.target.value })} placeholder="Optional details" />
          </div>

          <label className="flex items-center gap-2 text-sm cursor-pointer pt-1">
            <input type="checkbox" checked={!!e.showOnDashboard} onChange={ev => setE({ ...e, showOnDashboard: ev.target.checked })} />
            <span>Show on Dashboard</span>
          </label>
        </div>

        <div className="flex justify-between gap-2 mt-6">
          <div>
            {e.id && <button className="btn btn-ghost" onClick={() => onDelete(e.id)} style={{ color: 'var(--danger)' }}>Delete</button>}
          </div>
          <div className="flex gap-2">
            <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
            <button className="btn btn-accent" onClick={submit}>Save</button>
          </div>
        </div>
      </div>
    </div>
  );
}

function getOrdinalSuffix(n) {
  const s = ['th', 'st', 'nd', 'rd'];
  const v = n % 100;
  return s[(v - 20) % 10] || s[v] || s[0];
}

// =============================================================================

const TABS = [
  { key: 'dashboard', label: 'Dashboard' },
  { key: 'schedule', label: 'Schedule' },
  { key: 'calendar', label: 'Calendar' },
  { key: 'workers', label: 'Workers' },
  { key: 'fairness', label: 'Fairness' },
  { key: 'print', label: 'Print' },
  { key: 'data', label: 'Data' },
];

  useEffect(() => { saveState(state); }, [state]);

  return (
    <div className="min-h-screen bg-app">
      {/* Header */}

        <div className="max-w-7xl mx-auto px-6 pt-6 pb-0">
          <div className="flex items-baseline justify-between gap-4 flex-wrap">

              <div className="text-xs font-medium tracking-widest uppercase" style={{ color: 'var(--accent)' }}>{state.meta.churchName}</div>
              <h1 className="font-display text-3xl font-semibold mt-1">Schedule OS</h1>
            </div>
            <div className="text-xs ink-muted">
              <span className="font-mono">{formatMonthLabel(state.currentMonth)}</span>
              <span className="mx-2">·</span>
              <span>v{state.meta.version}</span>
            </div>
          </div>
          <nav className="flex flex-wrap mt-4">
            {TABS.map(t => (
              <button key={t.key} className={`tab ${activeTab === t.key ? 'tab-active' : ''}`} onClick={() => setActiveTab(t.key)}>
                {t.label}
              </button>
            ))}
          </nav>
        </div>
      </header>

      <main className="max-w-7xl mx-auto px-6 py-8">
        {activeTab === 'dashboard' && <DashboardTab state={state} dispatch={dispatch} />}
        {activeTab === 'schedule' && <ScheduleTab state={state} dispatch={dispatch} />}
        {activeTab === 'calendar' && <CalendarTab state={state} dispatch={dispatch} />}
        {activeTab === 'workers' && <WorkersTab state={state} dispatch={dispatch} />}
        {activeTab === 'fairness' && <FairnessTab state={state} />}
        {activeTab === 'print' && <PrintTab state={state} />}
        {activeTab === 'data' && <DataTab state={state} dispatch={dispatch} />}
      </main>

      <footer className="max-w-7xl mx-auto px-6 py-12 text-xs ink-subtle no-print">

      </footer>
    </div>
  );
}
